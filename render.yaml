# Render Blueprint — описание всех сервисов проекта.
# Render → New → Blueprint → выбрать этот репо → создаст всё одним кликом.
# https://render.com/docs/blueprint-spec

databases:
  - name: sa-db
    plan: free
    databaseName: startapps
    user: sa

services:
  # Backend — FastAPI с розетками sa.auth и sa.storage
  - type: web
    name: sa-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sa-db
          property: connectionString
      - key: SA_AUTH_SECRET
        generateValue: true
      - key: SA_ENV
        value: prod
      # Ключ Anthropic — задаётся вручную в Render Dashboard.
      - key: SA_ANTHROPIC_API_KEY
        sync: false

  # Frontend — статика (vite build), отдаётся CDN'ом Render бесплатно
  - type: web
    name: sa-frontend
    runtime: static
    rootDir: .
    buildCommand: cd frontend && npm install && VITE_SA_API="https://sa-backend-yj5r.onrender.com" npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /manifest.webmanifest
        name: Content-Type
        value: application/manifest+json
